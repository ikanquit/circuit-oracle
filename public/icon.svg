<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="CircuitOracle">
  <title>CircuitOracle</title>
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#050608"/>

  <!-- IC chip body -->
  <rect x="14" y="14" width="36" height="36" rx="3"
        fill="#0c0e12"
        stroke="#c6ff4d"
        stroke-width="2"/>

  <!-- Pin-1 marker (notch + dot) -->
  <path d="M14 22 a4 4 0 0 0 4 -4" fill="none" stroke="#c6ff4d" stroke-width="2"/>
  <circle cx="20" cy="20" r="1.5" fill="#ffb547"/>

  <!-- DIP pins, left/right -->
  <g fill="#c6ff4d">
    <rect x="8"  y="20" width="6" height="3" rx="0.5"/>
    <rect x="8"  y="28" width="6" height="3" rx="0.5"/>
    <rect x="8"  y="36" width="6" height="3" rx="0.5"/>
    <rect x="8"  y="44" width="6" height="3" rx="0.5"/>
    <rect x="50" y="20" width="6" height="3" rx="0.5"/>
    <rect x="50" y="28" width="6" height="3" rx="0.5"/>
    <rect x="50" y="36" width="6" height="3" rx="0.5"/>
    <rect x="50" y="44" width="6" height="3" rx="0.5"/>
  </g>

  <!-- Die / silicon mark — abstract slash echoing CIRCUIT/ORACLE wordmark -->
  <path d="M40 22 L24 42"
        stroke="#c6ff4d" stroke-width="3" stroke-linecap="square"/>
  <!-- Phosphor glow accent dot -->
  <circle cx="32" cy="32" r="2" fill="#ffb547"/>
</svg>
